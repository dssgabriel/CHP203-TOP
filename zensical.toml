[project]
site_name = "CHP203: Parallel Optimization Techniques"
site_url = "https://dssgabriel.github.io/CHP203-TOP"
site_author = "Hugo Taboada, Gabriel Dos Santos"

repo_name = "dssgabriel/CHP203-TOP"
repo_url = "https://github.com/dssgabriel/chp203-top"

copyright = "Copyright &copy; 2024 - 2026, Hugo Taboada & Gabriel Dos Santos"

extra_css = [
  "stylesheets/extra.css"
]
extra_javascript = [
  "javascripts/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]

nav = [
  {"Home" = "index.md"},
  {"Repository and tools" = "repository_and_tools.md"},
  {"Lab 1 - HPC toolchains & Performance profiling" = "lab1.md"},
  {"Lab 2 - Memory and data structure layouts" = "lab2.md"},
  {"Lab 3 - Shared-memory parallelism" = "lab3.md"},
  {"Lab 4 - Distributed-memory programming" = "lab4.md"},
  {"Lab 5 - Distributed-memory programming (advanced)" = "lab5.md"},
  {"Project - Hybrid parallel LBM optimization" = "project.md"},
  {"Appendix" = "appendix.md"}
]

[project.theme]
language = "en"

font.text = "Inter"
font.code = "Geist Mono"

features = [
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.top",
  "toc.follow",
  "search.highlight",
  "content.tabs.link"
]

[[project.theme.palette]] 
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
primary = "custom"
accent = "custom"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
primary = "custom"
accent = "custom"

[project.markdown_extensions]
admonition = {}
def_list = {}
footnotes = {}
tables = {}
attr_list = {}
md_in_html = {}

[project.markdown_extensions.pymdownx.blocks.caption]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
auto_title = true
linenums = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tabbed.slugify]
object = "pymdownx.slugs.slugify"
kwds.case = "lower"

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.arithmatex]
generic = true
